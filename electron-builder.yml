appId: com.cijferwerk.app
productName: Cijferwerk
directories:
  output: dist-electron
publish:
  provider: github
  owner: michaelschouten92-design
  repo: Cijferwerk
win:
  target: nsis
  icon: build-assets/icon.ico
  artifactName: Cijferwerk-${version}-Windows.${ext}
mac:
  target: dmg
  icon: build-assets/icon.png
  category: public.app-category.finance
  artifactName: Cijferwerk-${version}-Mac.${ext}
linux:
  target: AppImage
  icon: build-assets/icon.png
  category: Finance
  artifactName: Cijferwerk-${version}-Linux.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Cijferwerk
extraResources:
  - from: build-assets/standalone
    to: standalone
  - from: build-assets/template.db
    to: template.db
files:
  - electron/dist/**/*
  - node_modules/electron-updater/**
  - node_modules/builder-util-runtime/**
  - node_modules/lazy-val/**
  - node_modules/semver/**
  - node_modules/fs-extra/**
  - node_modules/js-yaml/**
  - node_modules/lodash.escaperegexp/**
  - node_modules/lodash.isequal/**
  - node_modules/tiny-typed-emitter/**
  - node_modules/graceful-fs/**
  - node_modules/jsonfile/**
  - node_modules/universalify/**
  - node_modules/argparse/**
  - "!src"
  - "!.next"
  - "!prisma"
  - "!uploads"
  - "!.claude"
  - "!build-assets"
asarUnpack:
  - "**/*.node"
